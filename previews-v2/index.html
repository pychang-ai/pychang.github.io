<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prof. Chang 網站預覽集合</title>
  <style>
    body{font-family:"Noto Sans CJK TC","Microsoft JhengHei",sans-serif;margin:0;background:#f6f8fb;color:#111827}
    .wrap{max-width:960px;margin:0 auto;padding:48px 24px}
    h1{font-size:40px;margin:0 0 14px}
    p{font-size:18px;line-height:1.8;color:#4b5563}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:28px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
    .card h2{font-size:22px;margin:0 0 10px}
    .card p{font-size:16px;margin:0 0 16px}
    a.btn{display:inline-block;padding:12px 16px;border-radius:12px;background:#111827;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prof. Chang 網站預覽集合</h1>
    <p>這裡是 3 個 GitHub Pages 可公開打開的網站預覽版本，請直接點開看第一眼感受。</p>
    <div class="grid">
      <div class="card">
        <h2>1. 極簡高級學者版</h2>
        <p>乾淨、留白多、像國外教授網站，高級、安靜、耐看。</p>
        <a class="btn" href="./minimal-luxury.html">打開預覽</a>
      </div>
      <div class="card">
        <h2>2. GitHub / Research 風格版</h2>
        <p>研究者 + 技術感，俐落、工程研究者風格、比較貼 AI 模型訓練。</p>
        <a class="btn" href="./github-research.html">打開預覽</a>
      </div>
      <div class="card">
        <h2>3. 國際學術品牌版</h2>
        <p>對外形象站，品牌感較強，完成度最高。</p>
        <a class="btn" href="./global-brand.html">打開預覽</a>
      </div>
    </div>
  </div>
</body>
</html>
